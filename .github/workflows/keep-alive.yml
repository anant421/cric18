name: Keep Render backend awake

on:
  schedule:
    # Every 5 minutes - comfortably inside Render's ~15 minute idle-sleep window.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          curl -sf -o /dev/null -w "Backend responded: HTTP %{http_code}\n" https://scorexi-api.onrender.com/api/health \
            || echo "Ping did not succeed - backend may have been mid-wake-up, not a failure worth alerting on"
